<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Диспетчерский контроль энергоснабжения</title>
    <!-- Подключаем математические библиотеки -->
    <script src="https://cdn.jsdelivr.net/npm/mathjs@11.8.0/lib/browser/math.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/simple-statistics@7.8.3/dist/simple-statistics.min.js"></script>
    <!-- Подключаем Chart.js для графиков -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #eee;
            padding: 12px;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            font-size: 1.5rem;
            margin-bottom: 6px;
            color: #00b4d8;
        }

        .subtitle {
            text-align: center;
            color: #aaa;
            font-size: 0.8rem;
            margin-bottom: 20px;
        }

        /* Дашборд с показателями - СЕТКА 2x3 */
        .dashboard {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }

        /* Для планшетов и ПК можно сделать 3x2 или 6 колонок */
        @media (min-width: 768px) {
            .dashboard {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        @media (min-width: 1024px) {
            .dashboard {
                grid-template-columns: repeat(6, 1fr);
            }
        }

        .card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 12px 8px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: transform 0.2s;
        }

        .card:active {
            transform: scale(0.98);
        }

        .card-value {
            font-size: 1.4rem;
            font-weight: bold;
            margin: 6px 0 4px;
            line-height: 1.2;
        }

        .card-label {
            color: #aaa;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .card-unit {
            font-size: 0.6rem;
            color: #888;
        }

        .warning {
            color: #ffd43b;
        }

        .danger {
            color: #ff6b6b;
            animation: pulse 1s infinite;
        }

        .normal {
            color: #51cf66;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        /* Основная сетка - на мобильных вертикально */
        .main-grid {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 20px;
        }

        /* Для планшетов и шире - сетка */
        @media (min-width: 768px) {
            .main-grid {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 20px;
            }
        }

        .panel {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 16px;
            padding: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .panel h3 {
            margin-bottom: 12px;
            color: #00b4d8;
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Таблица рисков - адаптивная */
        .risk-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.75rem;
        }

        .risk-table th, .risk-table td {
            padding: 8px 4px;
            text-align: left;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .risk-table th:first-child, .risk-table td:first-child {
            padding-left: 0;
        }

        .risk-table th:last-child, .risk-table td:last-child {
            padding-right: 0;
        }

        .risk-high {
            background: rgba(255, 68, 68, 0.2);
            color: #ff8888;
        }

        .risk-medium {
            background: rgba(255, 193, 7, 0.2);
            color: #ffd43b;
        }

        .risk-low {
            color: #51cf66;
        }

        /* Рекомендации */
        .recommendation-item {
            background: rgba(0, 180, 216, 0.1);
            margin: 10px 0;
            padding: 12px;
            border-radius: 12px;
            border-left: 3px solid #00b4d8;
            font-size: 0.85rem;
        }

        .recommendation-critical {
            border-left-color: #ff4444;
            background: rgba(255, 68, 68, 0.1);
        }

        .recommendation-high {
            border-left-color: #ff6b6b;
            background: rgba(255, 107, 107, 0.1);
        }

        /* Кнопки управления */
        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin-top: 16px;
        }

        button {
            background: #00b4d8;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 500;
            transition: all 0.3s;
            flex: 1;
            min-width: 100px;
            -webkit-tap-highlight-color: transparent;
        }

        button:active {
            transform: scale(0.97);
        }

        button.danger {
            background: #ff4444;
        }

        button.danger:active {
            background: #cc0000;
        }

        /* График */
        .chart-container {
            margin-top: 12px;
            height: 220px;
        }

        canvas {
            max-height: 220px;
            width: 100%;
        }

        /* История */
        .history-log {
            height: 120px;
            overflow-y: auto;
            font-size: 0.7rem;
            font-family: 'SF Mono', 'Courier New', monospace;
            background: rgba(0, 0, 0, 0.3);
            padding: 8px;
            border-radius: 12px;
            -webkit-overflow-scrolling: touch;
        }

        /* Дополнительные параметры */
        .params-stats {
            margin-top: 12px;
            padding: 10px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            font-size: 0.75rem;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 8px;
        }

        .params-stats div {
            flex: 1;
            text-align: center;
        }

        /* Для очень маленьких экранов */
        @media (max-width: 380px) {
            body {
                padding: 8px;
            }
            
            .card {
                padding: 8px 6px;
            }
            
            .card-value {
                font-size: 1.2rem;
            }
            
            .card-label {
                font-size: 0.65rem;
            }
            
            .panel {
                padding: 12px;
            }
            
            .risk-table {
                font-size: 0.7rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚡ Диспетчерский контроль ⚡</h1>
        <div class="subtitle">Мониторинг | Риски | Рекомендации в реальном времени</div>

        <!-- Дашборд - СЕТКА 2x3 -->
        <div class="dashboard" id="dashboard">
            <!-- Заполняется динамически -->
        </div>

        <!-- Основной контент -->
        <div class="main-grid">
            <!-- Текущие параметры -->
            <div class="panel">
                <h3>📊 Векторные параметры</h3>
                <canvas id="gaugeChart" style="height: 200px; width: 100%;"></canvas>
                <div class="params-stats" id="params-stats"></div>
            </div>

            <!-- Риски оборудования -->
            <div class="panel">
                <h3>⚠️ Оценка рисков</h3>
                <div style="overflow-x: auto;">
                    <table class="risk-table" id="risk-table">
                        <thead>
                            <tr><th>Оборудование</th><th>Вероятность</th><th>Ущерб</th><th>Риск</th></tr>
                        </thead>
                        <tbody id="risk-body"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- Рекомендации -->
        <div class="panel">
            <h3>💡 Рекомендации диспетчеру</h3>
            <div id="recommendations"></div>
        </div>

        <!-- История и управление -->
        <div class="panel">
            <h3>📜 История событий</h3>
            <div class="history-log" id="history-log"></div>
            
            <div class="controls">
                <button onclick="simulateCycle()">🔄 Цикл</button>
                <button onclick="simulateEmergency()" class="danger">⚠️ Авария</button>
                <button onclick="resetSystem()">🔄 Сброс</button>
            </div>
        </div>
    </div>

    <script>
        // Класс системы диспетчерского контроля
        class DispatcherControlSystem {
            constructor() {
                this.history = [];
                this.cycleCount = 0;
                
                // Состояние оборудования
                this.equipmentState = {
                    'Трансформатор Т-1': 0.85,
                    'Линия ЛЭП-110кВ': 0.92,
                    'Генератор Г-1': 0.78,
                    'Ввод РУ-10кВ': 0.65,
                    'Секция шин 1': 0.88
                };
                
                // Категории важности
                this.importance = {
                    '1 категория': 10,
                    '2 категория': 5,
                    '3 категория': 1
                };
                
                // Текущие параметры
                this.currentParams = this.generateNormalParams();
            }
            
            generateNormalParams() {
                return {
                    voltage: 10.5 + (Math.random() - 0.5) * 0.3,
                    current: 500 + (Math.random() - 0.5) * 50,
                    frequency: 50 + (Math.random() - 0.5) * 0.1,
                    power: 8.5 + (Math.random() - 0.5) * 1,
                    temperature: 65 + (Math.random() - 0.5) * 10,
                    powerFactor: 0.85 + (Math.random() - 0.5) * 0.1
                };
            }
            
            generateEmergencyParams() {
                return {
                    voltage: 8.2 + Math.random() * 1.5,
                    current: 850 + Math.random() * 100,
                    frequency: 48.5 + Math.random() * 1,
                    power: 14 + Math.random() * 2,
                    temperature: 95 + Math.random() * 15,
                    powerFactor: 0.65 + Math.random() * 0.2
                };
            }
            
            detectAnomalies(params) {
                const anomalies = [];
                
                const thresholds = {
                    voltage: { min: 9.5, max: 10.8 },
                    current: { min: 300, max: 700 },
                    frequency: { min: 49.5, max: 50.5 },
                    temperature: { min: 30, max: 85 },
                    powerFactor: { min: 0.75, max: 0.95 }
                };
                
                for (const [param, limits] of Object.entries(thresholds)) {
                    const value = params[param];
                    if (value < limits.min || value > limits.max) {
                        const severity = (value < limits.min * 0.9 || value > limits.max * 1.1) ? 'high' : 'medium';
                        anomalies.push({ param, value, severity });
                    }
                }
                
                if (this.history.length > 5) {
                    const historyValues = this.history.slice(-10).map(h => h.params.voltage);
                    const mean = ss.mean(historyValues);
                    const std = ss.standardDeviation(historyValues);
                    const zScore = Math.abs((params.voltage - mean) / std);
                    
                    if (zScore > 2.5) {
                        anomalies.push({
                            param: 'voltage (стат.)',
                            value: params.voltage,
                            severity: zScore > 3.5 ? 'high' : 'medium',
                            zScore: zScore
                        });
                    }
                }
                
                return anomalies;
            }
            
            calculateFailureProbability(equipment, params) {
                const state = this.equipmentState[equipment];
                const stateFactor = 1 - state;
                const loadFactor = params.current / 800;
                const tempFactor = Math.max(0, (params.temperature - 40) / 100);
                
                const logit = -3.5 + 4.0 * stateFactor + 5.0 * loadFactor + 3.0 * tempFactor;
                const probability = 1 / (1 + Math.exp(-logit));
                
                return Math.min(0.99, Math.max(0.01, probability));
            }
            
            calculateConsequence(equipment, params) {
                const power = params.power;
                
                let category;
                if (power > 10) category = '1 категория';
                else if (power > 5) category = '2 категория';
                else category = '3 категория';
                
                const importanceFactor = this.importance[category];
                const equipmentFactor = this.equipmentState[equipment] < 0.7 ? 1.5 : 1.0;
                const baseCost = 5000;
                
                return power * baseCost * importanceFactor * equipmentFactor;
            }
            
            calculateRisks(params) {
                const risks = [];
                
                for (const [equipment, state] of Object.entries(this.equipmentState)) {
                    const probability = this.calculateFailureProbability(equipment, params);
                    const consequence = this.calculateConsequence(equipment, params);
                    const risk = probability * consequence;
                    
                    risks.push({
                        equipment,
                        probability,
                        consequence,
                        risk,
                        level: risk > 5000 ? 'high' : (risk > 1000 ? 'medium' : 'low')
                    });
                }
                
                return risks.sort((a, b) => b.risk - a.risk);
            }
            
            generateRecommendations(anomalies, risks, params) {
                const recommendations = [];
                
                const criticalAnomalies = anomalies.filter(a => a.severity === 'high');
                if (criticalAnomalies.length > 0) {
                    recommendations.push({
                        priority: 'КРИТИЧЕСКИЙ',
                        text: `АВАРИЯ: ${criticalAnomalies.map(a => a.param).join(', ')}. Немедленное отключение!`,
                        action: 'emergency_shutdown',
                        timeframe: 'НЕМЕДЛЕННО'
                    });
                }
                
                const highRisks = risks.filter(r => r.level === 'high');
                if (highRisks.length > 0) {
                    recommendations.push({
                        priority: 'ВЫСОКИЙ',
                        text: `Снизить нагрузку на ${highRisks[0].equipment} на 30% (риск ${(highRisks[0].probability * 100).toFixed(1)}%)`,
                        action: 'load_shedding',
                        timeframe: '10 минут'
                    });
                }
                
                const mediumRisks = risks.filter(r => r.level === 'medium');
                if (mediumRisks.length > 0 && highRisks.length === 0) {
                    recommendations.push({
                        priority: 'СРЕДНИЙ',
                        text: `Резерв для ${mediumRisks[0].equipment}`,
                        action: 'prepare_reserve',
                        timeframe: '1 час'
                    });
                }
                
                if (params.power > 10) {
                    recommendations.push({
                        priority: 'РЕЖИМ',
                        text: `Перегрузка (${params.power.toFixed(1)} МВт). Отключить 3-категорийных потребителей`,
                        action: 'load_management',
                        timeframe: '30 минут'
                    });
                }
                
                if (recommendations.length === 0) {
                    recommendations.push({
                        priority: 'ИНФОРМАЦИЯ',
                        text: 'Режим в норме. Мониторинг продолжается.',
                        action: 'monitor',
                        timeframe: 'наблюдение'
                    });
                }
                
                return recommendations;
            }
            
            runControlCycle(isEmergency = false) {
                if (isEmergency) {
                    this.currentParams = this.generateEmergencyParams();
                } else {
                    this.currentParams = this.generateNormalParams();
                }
                
                const anomalies = this.detectAnomalies(this.currentParams);
                const risks = this.calculateRisks(this.currentParams);
                const recommendations = this.generateRecommendations(anomalies, risks, this.currentParams);
                
                const cycleData = {
                    timestamp: new Date(),
                    cycle: ++this.cycleCount,
                    params: { ...this.currentParams },
                    anomalies,
                    risks,
                    recommendations,
                    isEmergency
                };
                
                this.history.push(cycleData);
                
                if (this.history.length > 50) {
                    this.history.shift();
                }
                
                return cycleData;
            }
            
            getHistory() {
                return this.history;
            }
        }
        
        let dispatcherSystem = new DispatcherControlSystem();
        let currentCycleData = null;
        let chart = null;
        
        function updateDashboard(params, anomalies) {
            const dashboard = document.getElementById('dashboard');
            const hasEmergency = anomalies.some(a => a.severity === 'high');
            
            // Форматирование значений с единицами измерения
            const cards = [
                { label: 'Напряжение', value: params.voltage.toFixed(2), unit: 'кВ', 
                  status: params.voltage < 9.5 || params.voltage > 10.8 ? 'danger' : 'normal' },
                { label: 'Ток', value: params.current.toFixed(0), unit: 'А',
                  status: params.current > 700 ? 'danger' : (params.current > 600 ? 'warning' : 'normal') },
                { label: 'Частота', value: params.frequency.toFixed(2), unit: 'Гц',
                  status: params.frequency < 49.5 || params.frequency > 50.5 ? 'danger' : 'normal' },
                { label: 'Мощность', value: params.power.toFixed(2), unit: 'МВт',
                  status: params.power > 10 ? 'warning' : 'normal' },
                { label: 'Температура', value: params.temperature.toFixed(1), unit: '°C',
                  status: params.temperature > 85 ? 'danger' : (params.temperature > 75 ? 'warning' : 'normal') },
                { label: 'cos φ', value: params.powerFactor.toFixed(2), unit: '',
                  status: params.powerFactor < 0.75 ? 'danger' : (params.powerFactor < 0.85 ? 'warning' : 'normal') }
            ];
            
            dashboard.innerHTML = cards.map(card => `
                <div class="card">
                    <div class="card-label">${card.label}</div>
                    <div class="card-value ${card.status}">${card.value}</div>
                    <div class="card-unit">${card.unit}</div>
                </div>
            `).join('');
        }
        
        function updateParamsStats(params) {
            const container = document.getElementById('params-stats');
            const powerPercent = (params.power / 12 * 100).toFixed(0);
            const reservePower = (12 - params.power).toFixed(2);
            
            container.innerHTML = `
                <div>⚡ ${params.power.toFixed(2)} МВт</div>
                <div>📈 ${powerPercent}% нагрузки</div>
                <div>🔋 ${reservePower} МВт резерв</div>
                <div>🎯 cos φ = ${params.powerFactor.toFixed(2)}</div>
            `;
        }
        
        function updateRiskTable(risks) {
            const tbody = document.getElementById('risk-body');
            tbody.innerHTML = risks.map(risk => `
                <tr class="risk-${risk.level}">
                    <td>${risk.equipment}</td>
                    <td>${(risk.probability * 100).toFixed(1)}%</td>
                    <td>${Math.round(risk.consequence).toLocaleString()} руб</td>
                    <td>${Math.round(risk.risk).toLocaleString()} </td>
                </tr>
            `).join('');
        }
        
        function updateRecommendations(recommendations) {
            const container = document.getElementById('recommendations');
            container.innerHTML = recommendations.map(rec => `
                <div class="recommendation-item recommendation-${rec.priority.toLowerCase()}">
                    <strong>[${rec.priority}]</strong> ${rec.text}<br>
                    <small>⏱️ ${rec.timeframe}</small>
                </div>
            `).join('');
        }
        
        function updateHistory(history) {
            const log = document.getElementById('history-log');
            const recentHistory = history.slice(-10).reverse();
            log.innerHTML = recentHistory.map(entry => `
                <div style="padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: space-between; flex-wrap: wrap; gap: 4px;">
                    <span>${entry.timestamp.toLocaleTimeString().slice(0,5)}</span>
                    <span>⚡${entry.params.power.toFixed(1)}МВт</span>
                    <span>${entry.isEmergency ? '🔥 АВАРИЯ' : '✅ НОРМА'}</span>
                    <span>⚠️${entry.anomalies.length}</span>
                </div>
            `).join('');
        }
        
        function updateUI(cycleData) {
            updateDashboard(cycleData.params, cycleData.anomalies);
            updateParamsStats(cycleData.params);
            updateRiskTable(cycleData.risks);
            updateRecommendations(cycleData.recommendations);
            updateHistory(dispatcherSystem.getHistory());
            
            if (chart) {
                const normVoltage = Math.min(120, (cycleData.params.voltage / 12) * 100);
                const normCurrent = Math.min(120, (cycleData.params.current / 900) * 100);
                const normFreq = Math.min(120, (cycleData.params.frequency / 52) * 100);
                const normPower = Math.min(120, (cycleData.params.power / 15) * 100);
                const normTemp = Math.min(120, (cycleData.params.temperature / 100) * 100);
                
                chart.data.datasets[0].data = [normVoltage, normCurrent, normFreq, normPower, normTemp];
                chart.update();
            }
        }
        
        function simulateCycle() {
            currentCycleData = dispatcherSystem.runControlCycle(false);
            updateUI(currentCycleData);
        }
        
        function simulateEmergency() {
            currentCycleData = dispatcherSystem.runControlCycle(true);
            updateUI(currentCycleData);
        }
        
        function resetSystem() {
            dispatcherSystem = new DispatcherControlSystem();
            currentCycleData = dispatcherSystem.runControlCycle(false);
            updateUI(currentCycleData);
        }
        
        function initChart() {
            const ctx = document.getElementById('gaugeChart').getContext('2d');
            chart = new Chart(ctx, {
                type: 'radar',
                data: {
                    labels: ['Напряжение', 'Ток', 'Частота', 'Мощность', 'Температура'],
                    datasets: [{
                        label: 'Текущие параметры',
                        data: [87, 65, 96, 75, 70],
                        backgroundColor: 'rgba(0, 180, 216, 0.2)',
                        borderColor: '#00b4d8',
                        borderWidth: 2,
                        pointBackgroundColor: '#00b4d8',
                        pointBorderColor: '#fff',
                        pointRadius: 4,
                        pointHoverRadius: 6
                    }, {
                        label: 'Норма',
                        data: [88, 56, 96, 57, 65],
                        backgroundColor: 'rgba(81, 207, 102, 0.05)',
                        borderColor: '#51cf66',
                        borderWidth: 1.5,
                        borderDash: [5, 5],
                        fill: false,
                        pointRadius: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    plugins: {
                        legend: {
                            position: 'bottom',
                            labels: { color: '#aaa', font: { size: 10 } }
                        }
                    },
                    scales: {
                        r: {
                            beginAtZero: true,
                            max: 120,
                            ticks: {
                                stepSize: 30,
                                backdropColor: 'transparent',
                                color: '#aaa',
                                font: { size: 9 }
                            },
                            grid: { color: 'rgba(255,255,255,0.1)' }
                        }
                    }
                }
            });
        }
        
        initChart();
        simulateCycle();
        
        setInterval(() => {
            simulateCycle();
        }, 10000);
    </script>
</body>
</html>
